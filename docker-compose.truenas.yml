# =============================================================================
# FamCal — TrueNAS Custom App (Docker Compose)
# =============================================================================
#
# SETUP:
# 1. In TrueNAS: Apps → Discover → Custom App
# 2. Paste this YAML
# 3. Fill in environment variables below
# 4. If images are private, add registry credentials:
#    docker login ghcr.io -u asik-mydeen -p <GITHUB_PAT>
#
# CLOUDFLARE TUNNEL:
#   Add entry: calendar.asikmydeen.com → http://172.16.0.1:9080
#
# =============================================================================

services:
  famcal-api:
    image: ghcr.io/asik-mydeen/famcal-api:latest
    container_name: famcal-api
    restart: unless-stopped
    ports:
      - "9300:3000"
    environment:
      # --- Supabase (self-hosted) ---
      - SUPABASE_URL=https://supabase-api.asikmydeen.com
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      # --- Google OAuth ---
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      # --- OpenAI ---
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # --- Amazon Nova ---
      - NOVA_API_KEY=${NOVA_API_KEY}
      # --- Cron ---
      - CRON_SECRET=${CRON_SECRET}
      # --- CORS ---
      - ALLOWED_ORIGINS=https://calendar.asikmydeen.com,tauri://localhost,https://tauri.localhost,http://localhost:3000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nova-proxy:
    image: ghcr.io/asik-mydeen/nova-proxy:latest
    container_name: nova-proxy
    restart: unless-stopped
    ports:
      - "9380:8080"
    environment:
      - NOVA_API_KEY=${NOVA_API_KEY}
      - PORT=8080
      - ALLOWED_ORIGINS=https://calendar.asikmydeen.com,tauri://localhost,https://tauri.localhost,http://localhost:3000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8080/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  famcal-nginx:
    image: ghcr.io/asik-mydeen/famcal-nginx:latest
    container_name: famcal-nginx
    restart: unless-stopped
    ports:
      - "9080:80"
    depends_on:
      famcal-api:
        condition: service_healthy
      nova-proxy:
        condition: service_healthy
