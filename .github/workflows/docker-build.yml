name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [famcal-source-updated]

env:
  OWNER: asik-mydeen
  SOURCE_REPO: asikmydeen/famcal
  SOURCE_REF: main

jobs:
  build-and-push:
    name: Build & Push all images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout famcal source (public)
        uses: actions/checkout@v4
        with:
          repository: asik-mydeen/famcal
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push  famcal-nginx (React + nginx)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          cache-from: type=gha,scope=famcal-web
          cache-to: type=gha,mode=max,scope=famcal-web
          build-args: |
            REACT_APP_SUPABASE_URL=${{ secrets.REACT_APP_SUPABASE_URL }}
            REACT_APP_SUPABASE_ANON_KEY=${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
            REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
            REACT_APP_SITE_URL=https://calendar.asikmydeen.com
            REACT_APP_NOVA_PROXY_URL=wss://nova.asikmydeen.com
          tags: |
            ghcr.io/asik-mydeen/famcal-nginx:latest
            ghcr.io/asik-mydeen/famcal-nginx:${{ github.sha }}

      - name: Build & push famcal-api (Express API)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          cache-from: type=gha,scope=famcal-api
          cache-to: type=gha,mode=max,scope=famcal-api
          tags: |
            ghcr.io/asik-mydeen/famcal-api:latest
            ghcr.io/asik-mydeen/famcal-api:${{ github.sha }}

      - name: Build & push famcal-nova-proxy
        uses: docker/build-push-action@v6
        with:
          context: ./nova-proxy
          file: nova-proxy/Dockerfile
          push: true
          cache-from: type=gha,scope=famcal-nova
          cache-to: type=gha,mode=max,scope=famcal-nova
          tags: |
            ghcr.io/asik-mydeen/nova-proxy:latest
            ghcr.io/asik-mydeen/nova-proxy:${{ github.sha }}

      - name: Build summary
        run: |
          {
            echo "## Images pushed to GHCR"
            echo ""
            echo "| Image | Tag |"
            echo "|-------|-----|"
            echo "| ghcr.io/asik-mydeen/ famcal-nginx | latest |"
            echo "| ghcr.io/asik-mydeen/famcal-api | latest |"
            echo "| ghcr.io/asik-mydeen/nova-proxy | latest |"
            echo ""
            echo "**On TrueNAS:** docker-compose pull && docker-compose up -d"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger Dokploy redeploy

        run: |
          curl -s -X POST "$DOKPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"event":"deploy"}' || true
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
